<!doctype html>
<html lang="zh-CN">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet</title>
    <link rel="stylesheet" href="./pet.css" />
  </head>
  <body>
    <section class="pet-stage" aria-label="desktop pet">

    </section>
    <script src="./pet.js"></script>
  </body>
</html>
